name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test

  build-and-release:
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: bash Scripts/package_app.sh

      - name: Create zip
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ditto -c -k --keepParent CursorMeter.app "CursorMeter-${APP_VERSION}.zip"

      - name: Generate release notes
        id: notes
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          VERSION="${APP_VERSION}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi

          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS= read -r line; do
            msg="${line#* }"  # strip short hash
            case "$msg" in
              feat:*|feat\(*) FEATURES="${FEATURES}\n- ${msg}" ;;
              fix:*|fix\(*)   FIXES="${FIXES}\n- ${msg}" ;;
              *)              OTHERS="${OTHERS}\n- ${msg}" ;;
            esac
          done < <(git log --oneline "$RANGE" 2>/dev/null)

          {
            echo 'body<<BODY_EOF'
            echo "## Install"
            echo ""
            echo "### Quick Install (recommended)"
            echo ""
            echo 'Downloads, unzips, removes quarantine, and moves to `/Applications` automatically. ([view script](https://github.com/WoojinAhn/CursorMeter/blob/main/Scripts/install.sh))'
            echo ""
            echo '```bash'
            echo "curl -sL https://raw.githubusercontent.com/WoojinAhn/CursorMeter/main/Scripts/install.sh | bash"
            echo '```'
            echo ""
            echo "### Manual Install"
            echo "1. Download **CursorMeter-${VERSION}.zip** below"
            echo "2. Unzip the archive"
            echo '3. Remove quarantine: `xattr -cr CursorMeter.app`'
            echo '4. If upgrading, quit the running app first (menu bar → Quit)'
            echo '5. Move `CursorMeter.app` to `/Applications`'
            echo "6. Launch from Applications or Spotlight"
            echo ""
            echo "---"
            echo ""
            echo "## 설치"
            echo ""
            echo "### 빠른 설치 (권장)"
            echo ""
            echo '다운로드, 압축 해제, 격리 해제, `/Applications` 이동을 자동으로 수행합니다. ([스크립트 보기](https://github.com/WoojinAhn/CursorMeter/blob/main/Scripts/install.sh))'
            echo ""
            echo '```bash'
            echo "curl -sL https://raw.githubusercontent.com/WoojinAhn/CursorMeter/main/Scripts/install.sh | bash"
            echo '```'
            echo ""
            echo "### 수동 설치"
            echo "1. 아래에서 **CursorMeter-${VERSION}.zip** 다운로드"
            echo "2. 압축 해제"
            echo '3. 격리 해제: `xattr -cr CursorMeter.app`'
            echo '4. 업그레이드 시, 실행 중인 앱 먼저 종료 (메뉴바 → Quit)'
            echo '5. `CursorMeter.app`을 `/Applications`로 이동'
            echo "6. Applications 또는 Spotlight에서 실행"
            echo ""
            echo "---"
            echo ""
            echo "## What's Changed"
            if [ -n "$FEATURES" ]; then
              echo ""
              echo "### New Features"
              echo -e "$FEATURES"
            fi
            if [ -n "$FIXES" ]; then
              echo ""
              echo "### Bug Fixes"
              echo -e "$FIXES"
            fi
            if [ -n "$OTHERS" ]; then
              echo ""
              echo "### Other Changes"
              echo -e "$OTHERS"
            fi
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CursorMeter-${{ steps.version.outputs.version }}.zip
          body: ${{ steps.notes.outputs.body }}
